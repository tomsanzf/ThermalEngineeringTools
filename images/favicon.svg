<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="hotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="coldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer Rotating Ring effect -->
  <circle cx="32" cy="32" r="28" stroke="url(#hotGrad)" stroke-width="2.5" stroke-dasharray="35 15 15 15" opacity="0.6"/>
  <circle cx="32" cy="32" r="28" stroke="url(#coldGrad)" stroke-width="2.5" stroke-dasharray="15 15 35 15" opacity="0.6" transform="rotate(180 32 32)"/>
  
  <!-- Hot wave (Flame element) -->
  <path d="M32 12C21 12 20 28 20 36C20 42.6 25.4 48 32 48C34.5 48 36.8 47.2 38.8 45.8C35.5 44 33 40.5 33 36C33 30 38 24 38 18C38 15.5 35.5 13 32 12Z" fill="url(#hotGrad)" filter="url(#glow)" />
  
  <!-- Cold wave (Droplet element) -->
  <path d="M32 52C43 52 44 36 44 28C44 21.4 38.6 16 32 16C29.5 16 27.2 16.8 25.2 18.2C28.5 20 31 23.5 31 28C31 34 26 40 26 46C26 48.5 28.5 51 32 52Z" fill="url(#coldGrad)" filter="url(#glow)" />
</svg>
